# Reference reverse-proxy config for a single-VM / non-k8s deployment.
# In Kubernetes, the ingress-nginx controller (see ../k8s/20-ingress.yaml)
# replaces this file's role.

worker_processes auto;

events { worker_connections 1024; }

http {
    include mime.types;
    sendfile on;
    gzip on;

    upstream backend_upstream { server backend:8000; }
    upstream web_upstream { server web:3000; }
    upstream ai_engine_upstream { server ai-engine:8100; }

    server {
        listen 80;
        server_name app.equidx.example.com;

        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name api.equidx.example.com;

        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /graphql {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
        }

        location /ai/ {
            proxy_pass http://ai_engine_upstream/;
            proxy_set_header Host $host;
        }
    }
}
