apiVersion: apps/v1
kind: Deployment
metadata:
  name: biosensor-simulator
  namespace: equidx
spec:
  replicas: 2
  selector: { matchLabels: { app: biosensor-simulator } }
  template:
    metadata: { labels: { app: biosensor-simulator } }
    spec:
      containers:
        - name: biosensor-simulator
          image: ghcr.io/equidx-ai/biosensor-simulator:latest
          ports: [{ containerPort: 8200 }]
          readinessProbe: { httpGet: { path: /health, port: 8200 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: biosensor-simulator
  namespace: equidx
spec:
  selector: { app: biosensor-simulator }
  ports: [{ port: 8200, targetPort: 8200 }]
