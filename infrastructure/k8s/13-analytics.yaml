apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: equidx
spec:
  replicas: 2
  selector: { matchLabels: { app: analytics } }
  template:
    metadata: { labels: { app: analytics } }
    spec:
      containers:
        - name: analytics
          image: ghcr.io/equidx-ai/analytics:latest
          ports: [{ containerPort: 8300 }]
          envFrom:
            - configMapRef: { name: equidx-config }
            - secretRef: { name: equidx-secrets }
          readinessProbe: { httpGet: { path: /health, port: 8300 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: equidx
spec:
  selector: { app: analytics }
  ports: [{ port: 8300, targetPort: 8300 }]
