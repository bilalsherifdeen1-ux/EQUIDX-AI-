apiVersion: v1
kind: ConfigMap
metadata:
  name: equidx-config
  namespace: equidx
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  ALGORITHM: "HS256"
  AI_ENGINE_URL: "http://ai-engine:8100"
  S3_BUCKET_NAME: "equidx-uploads"
  S3_REGION: "us-east-1"
  NEXT_PUBLIC_API_URL: "https://api.equidx.example.com"
  NEXT_PUBLIC_GRAPHQL_URL: "https://api.equidx.example.com/graphql"
