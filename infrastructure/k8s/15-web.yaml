apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: equidx
spec:
  replicas: 3
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web } }
    spec:
      containers:
        - name: web
          image: ghcr.io/equidx-ai/web:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: equidx-config }
          readinessProbe: { httpGet: { path: /, port: 3000 }, initialDelaySeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: equidx
spec:
  selector: { app: web }
  ports: [{ port: 3000, targetPort: 3000 }]
