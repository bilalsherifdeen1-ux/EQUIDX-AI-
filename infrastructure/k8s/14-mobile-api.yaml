apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-api
  namespace: equidx
spec:
  replicas: 2
  selector: { matchLabels: { app: mobile-api } }
  template:
    metadata: { labels: { app: mobile-api } }
    spec:
      containers:
        - name: mobile-api
          image: ghcr.io/equidx-ai/mobile-api:latest
          ports: [{ containerPort: 8400 }]
          env:
            - { name: BACKEND_URL, value: "http://backend:8000" }
          readinessProbe: { httpGet: { path: /health, port: 8400 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-api
  namespace: equidx
spec:
  selector: { app: mobile-api }
  ports: [{ port: 8400, targetPort: 8400 }]
