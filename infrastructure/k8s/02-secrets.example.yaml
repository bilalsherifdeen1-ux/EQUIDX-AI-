# Example only — do NOT commit real secrets. Populate via a secrets
# manager (e.g. AWS Secrets Manager + External Secrets Operator, or
# `kubectl create secret` in your deploy pipeline) instead of editing
# this file directly.
apiVersion: v1
kind: Secret
metadata:
  name: equidx-secrets
  namespace: equidx
type: Opaque
stringData:
  SECRET_KEY: "replace-with-a-long-random-string"
  DATABASE_URL: "postgresql+asyncpg://equidx:changeme@postgres:5432/equidx"
  REDIS_URL: "redis://redis:6379/0"
  S3_ACCESS_KEY: "replace-me"
  S3_SECRET_KEY: "replace-me"
  S3_ENDPOINT_URL: "https://s3.us-east-1.amazonaws.com"
