apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: equidx-ingress
  namespace: equidx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["app.equidx.example.com", "api.equidx.example.com"]
      secretName: equidx-tls
  rules:
    - host: app.equidx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 3000 } } }
    - host: api.equidx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: backend, port: { number: 8000 } } }
