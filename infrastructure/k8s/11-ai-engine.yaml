apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: equidx
  labels: { app: ai-engine }
spec:
  replicas: 2
  selector: { matchLabels: { app: ai-engine } }
  template:
    metadata: { labels: { app: ai-engine } }
    spec:
      containers:
        - name: ai-engine
          image: ghcr.io/equidx-ai/ai-engine:latest
          ports: [{ containerPort: 8100 }]
          readinessProbe: { httpGet: { path: /health, port: 8100 }, initialDelaySeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 8100 }, initialDelaySeconds: 20 }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "2Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: equidx
spec:
  selector: { app: ai-engine }
  ports: [{ port: 8100, targetPort: 8100 }]
