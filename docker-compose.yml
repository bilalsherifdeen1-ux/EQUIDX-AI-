version: "3.9"

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://equidx:equidx_dev_password@postgres:5432/equidx}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production-please-use-a-long-random-string}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-equidx_minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-equidx_minio_secret}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-equidx-uploads}
  AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:8100}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equidx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equidx_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-equidx}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equidx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-equidx_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-equidx_minio_secret}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  backend:
    build: ./backend
    environment: *backend-env
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ai-engine:
    build: ./ai-engine
    ports: ["8100:8100"]
    volumes:
      - ./ai-engine:/app
    command: uvicorn ai_engine.serve:app --host 0.0.0.0 --port 8100 --reload

  biosensor-simulator:
    build: ./biosensor-simulator
    ports: ["8200:8200"]
    volumes:
      - ./biosensor-simulator:/app
    command: uvicorn simulator.main:app --host 0.0.0.0 --port 8200 --reload

  analytics:
    build: ./analytics
    environment: *backend-env
    ports: ["8300:8300"]
    depends_on:
      postgres: {condition: service_healthy}
    volumes:
      - ./analytics:/app
    command: uvicorn analytics_service.main:app --host 0.0.0.0 --port 8300 --reload

  mobile-api:
    build: ./mobile-api
    environment:
      <<: *backend-env
      BACKEND_URL: http://backend:8000
    ports: ["8400:8400"]
    depends_on: [backend]
    volumes:
      - ./mobile-api:/app
    command: uvicorn mobile_api.main:app --host 0.0.0.0 --port 8400 --reload

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:8000/graphql
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafanadata:/var/lib/grafana
    ports: ["3001:3000"]
    depends_on: [prometheus]

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes: ["osdata:/usr/share/opensearch/data"]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports: ["5601:5601"]
    depends_on: [opensearch]

volumes:
  pgdata:
  redisdata:
  miniodata:
  grafanadata:
  osdata:
